<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;

    padding-bottom: 30px; max-width: 800px; margin: 0 auto;
}
.header {
    background: #2b5797; color: #fff;
    padding: 16px 18px 12px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
}
.header-text h1 { font-size: 1.2rem; margin-bottom: 2px; }
.header-text p { color: #b0c8e8; font-size: 0.75rem; font-style: italic; }
.lang-select {
    background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px; padding: 6px 8px; font-size: 0.8rem; margin-top: 2px;
}
.lang-select option { color: #333; background: #fff; }
.card {
    background: #fff; border: 1px solid #d0d8e4; border-radius: 8px;
    margin: 0 12px 12px; padding: 14px 16px;
}
.card h2 {
    color: #2b5797; font-size: 0.95rem; margin-bottom: 10px;
    border-bottom: 1px solid #e8ecf2; padding-bottom: 6px;
}
.card h3 { color: #2b5797; font-size: 0.85rem; margin: 8px 0 4px; }
label.field { display: block; font-size: 0.8rem; color: #555; margin-bottom: 4px; font-weight: 600; }
input[type="text"], input[type="date"] {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 0.9rem; margin-bottom: 10px; background: #fafbfc;
}
input[type="text"]:focus, input[type="date"]:focus { border-color: #2b5797; outline: none; }
.radio-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.radio-group label {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    border: 1px solid #d0d8e4; border-radius: 6px; cursor: pointer;
    font-size: 0.85rem; transition: all 0.15s; background: #fafbfc;
}
.radio-group input[type="radio"] { accent-color: #2b5797; }
.radio-group label:has(input:checked) {
    background: #d6e4f5; border-color: #2b5797; font-weight: 600;
}
.info-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; background: #2b5797; color: #fff;
    border-radius: 50%; font-size: 0.75rem; font-weight: 700;
    border: none; cursor: pointer; margin-left: 8px; vertical-align: middle;
}
.risk-desc {
    background: #f5f7fa; border-radius: 6px; padding: 10px 12px;
    margin-top: 8px; font-size: 0.75rem; color: #5a6a7a; line-height: 1.5;
}
.risk-desc strong { color: #333; }
.risk-desc em { color: #7a8a9a; }
.result-box {
    background: #f8fafc; border: 1px solid #d0d8e4; border-radius: 8px;
    padding: 14px; margin-top: 8px; color: #1a2a3a;
}
.result-box h4 { color: #2b5797; font-size: 0.85rem; margin: 10px 0 4px; }
.result-box h4:first-child { margin-top: 0; }
.result-box .field-row { font-size: 0.85rem; line-height: 1.6; }
.result-box .field-row b { color: #333; }
.fu-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.82rem; }
.fu-table th { background: #d6e4f5; color: #2b5797; text-align: left; padding: 6px 10px; }
.fu-table td { padding: 5px 10px; }
.fu-table tr:nth-child(even) { background: #f0f4f8; }
.fu-table .date { color: #2b7a3e; font-weight: 600; }
.note { color: #b85c00; font-style: italic; font-size: 0.82rem; margin-top: 6px; }
.btn-pdf {
    display: block; width: calc(100% - 24px); margin: 12px auto;
    padding: 14px; background: #2b5797; color: #fff; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer;
}
.btn-pdf:active { background: #1d3f6f; }
.btn-pdf:disabled { background: #999; }
/* Modal */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-start;
    padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
    background: #fff; border-radius: 10px; width: 100%; max-width: 600px;
    max-height: 85vh; overflow-y: auto;
}
.modal-header {
    background: #2b5797; color: #fff; padding: 14px 16px;
    font-weight: 700; font-size: 1rem; border-radius: 10px 10px 0 0;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0;
}
.modal-close {
    background: none; border: none; color: #fff; font-size: 1.5rem;
    cursor: pointer; padding: 0 4px; line-height: 1;
}
.modal-body { padding: 16px; }
.modal-body h3 { color: #2b5797; font-size: 0.9rem; margin: 14px 0 6px; border-bottom: 1px solid #e8ecf2; padding-bottom: 4px; }
.modal-body h3:first-child { margin-top: 0; }
.modal-body ul { padding-left: 18px; margin-bottom: 6px; }
.modal-body li { font-size: 0.82rem; color: #333; line-height: 1.6; margin-bottom: 4px; }
.placeholder { color: #888; font-style: italic; font-size: 0.85rem; padding: 10px 0; }
</style>
</head>
<body>

<div class="header">
    <div class="header-text">
        <h1 id="hdr-title"></h1>
        <p id="hdr-sub"></p>
    </div>
    <select class="lang-select" id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
    </select>
</div>

<!-- Patient Info -->
<div class="card">
    <h2 id="lbl-patient-info"></h2>
    <label class="field" id="lbl-name"></label>
    <input type="text" id="patientName" oninput="update()">
    <label class="field" id="lbl-date"></label>
    <input type="date" id="imagingDate" onchange="update()">
</div>

<!-- Classification -->
<div class="card">
    <h2 id="lbl-classification"></h2>
    <h3 id="lbl-type"></h3>
    <div class="radio-group" id="typeGroup"></div>
    <h3 id="lbl-count"></h3>
    <div class="radio-group" id="countGroup"></div>
</div>

<!-- Size -->
<div class="card">
    <h2>
        <span id="lbl-size"></span>
        <button class="info-btn" onclick="showModal()">i</button>
    </h2>
    <div class="radio-group" id="sizeGroup"></div>
</div>

<!-- Risk -->
<div class="card" id="riskCard">
    <h2 id="lbl-risk"></h2>
    <div class="radio-group" id="riskGroup"></div>
    <div class="risk-desc" id="riskDesc"></div>
</div>

<!-- Result -->
<div class="card">
    <h2 id="lbl-recommendation"></h2>
    <div id="resultArea"><p class="placeholder" id="lbl-fill-all"></p></div>
</div>

<!-- PDF Button -->
<button class="btn-pdf" id="btnPdf" onclick="createPdf()" disabled></button>

<!-- Info Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="hideModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modal-title"></span>
            <button class="modal-close" onclick="hideModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

    "Solid|Single|size_6_8|low": [6,12,18,24],

    "Solid|Multiple|size_6_8|low": [3,6,18,24],
    "Solid|Multiple|size_6_8|high": [3,6,18,24],
    "Solid|Single|size_gt8|low": [3],
    "Solid|Single|size_gt8|high": [3],
    "Solid|Multiple|size_gt8|low": [3,6,18,24],
    "Solid|Multiple|size_gt8|high": [3,6,18,24],
    "Subsolid|Single|size_gg_lt6|none": [],
    "Subsolid|Single|size_gg_gte6|none": [6,12,24,36,48,60],
    "Subsolid|Single|size_ps_lt6|none": [],
    "Subsolid|Single|size_ps_gte6|none": [3,6,12,24,36,48,60],
    "Subsolid|Multiple|size_sub_lt6|none": [3,6,24,48],
    "Subsolid|Multiple|size_sub_gte6|none": [3,6]
};

const SOLID_SIZES = ["size_lt6","size_6_8","size_gt8"];
const SUB_SINGLE_SIZES = ["size_gg_lt6","size_gg_gte6","size_ps_lt6","size_ps_gte6"];
const SUB_MULTI_SIZES = ["size_sub_lt6","size_sub_gte6"];

let lang = "en";
let currentData = null;

function t(key) { return T[lang][key] || key; }

function fmtDate(d) {
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = String(d.getFullYear()).slice(-2);
    return `${dd}.${mm}.${yy}`;
}

function addMonths(d, m) {
    const r = new Date(d.getTime());
    r.setDate(r.getDate() + 30 * m);
    return r;
}

function getVal(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : null;
}

// ========== UI BUILDING ==========
function buildRadios(containerId, name, options, onChange) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    options.forEach(opt => {
        const lbl = document.createElement('label');
        const inp = document.createElement('input');
        inp.type = 'radio'; inp.name = name; inp.value = opt.value;
        inp.onchange = onChange;
        lbl.appendChild(inp);
        lbl.appendChild(document.createTextNode(' ' + opt.label));
        c.appendChild(lbl);
    });
}

function refreshLabels() {
    // Save current radio selections before rebuilding
    const savedType = getVal('ntype');
    const savedCount = getVal('ncount');
    const savedSize = getVal('nsize');
    const savedRisk = getVal('nrisk');

    document.getElementById('hdr-title').textContent = t('page_title');
    document.getElementById('hdr-sub').textContent = t('page_subtitle');
    document.getElementById('lbl-patient-info').textContent = t('patient_info');
    document.getElementById('lbl-name').textContent = t('patient_name');
    document.getElementById('lbl-date').textContent = t('imaging_date');
    document.getElementById('lbl-classification').textContent = t('nodule_classification');
    document.getElementById('lbl-type').textContent = t('type');
    document.getElementById('lbl-count').textContent = t('count');
    document.getElementById('lbl-size').textContent = t('nodule_size');
    document.getElementById('lbl-risk').textContent = t('risk_level');
    document.getElementById('lbl-recommendation').textContent = t('recommendation');
    const fillEl = document.getElementById('lbl-fill-all');
    if (fillEl) fillEl.textContent = t('fill_all_fields');
    document.getElementById('btnPdf').textContent = t('create_report');

    // Risk desc
    document.getElementById('riskDesc').innerHTML =
        t('high_risk_desc') + '<br>' + t('low_risk_desc') + '<br>' + t('risk_note');

    // Rebuild radios with translated labels
    buildRadios('typeGroup', 'ntype', [
        {value:'Solid', label: t('solid')}, {value:'Subsolid', label: t('subsolid')}
    ], () => { rebuildSizes(); update(); });

    buildRadios('countGroup', 'ncount', [
        {value:'Single', label: t('single')}, {value:'Multiple', label: t('multiple')}
    ], () => { rebuildSizes(); update(); });

    buildRadios('riskGroup', 'nrisk', [
        {value:'low', label: t('low_risk')}, {value:'high', label: t('high_risk')}
    ], update);

    // Restore saved selections
    if (savedType) { const el = document.querySelector(`input[name="ntype"][value="${savedType}"]`); if (el) el.checked = true; }
    if (savedCount) { const el = document.querySelector(`input[name="ncount"][value="${savedCount}"]`); if (el) el.checked = true; }
    if (savedRisk) { const el = document.querySelector(`input[name="nrisk"][value="${savedRisk}"]`); if (el) el.checked = true; }

    rebuildSizes();

    // Restore size selection after sizes are rebuilt
    if (savedSize) { const el = document.querySelector(`input[name="nsize"][value="${savedSize}"]`); if (el) el.checked = true; }

    update();
}

function rebuildSizes() {
    const ntype = getVal('ntype');
    const ncount = getVal('ncount');
    let keys = [];
    if (ntype === 'Solid') keys = SOLID_SIZES;
    else if (ntype === 'Subsolid' && ncount === 'Single') keys = SUB_SINGLE_SIZES;
    else if (ntype === 'Subsolid' && ncount === 'Multiple') keys = SUB_MULTI_SIZES;

    buildRadios('sizeGroup', 'nsize', keys.map(k => ({value: k, label: t(k)})), update);

    // Show/hide risk card
    document.getElementById('riskCard').style.display = (ntype === 'Subsolid') ? 'none' : '';
    update();
}

function update() {
    const name = document.getElementById('patientName').value.trim();
    const dateStr = document.getElementById('imagingDate').value;
    const ntype = getVal('ntype');
    const ncount = getVal('ncount');
    const nsize = getVal('nsize');
    const nrisk = (ntype === 'Solid') ? getVal('nrisk') : 'none';

    const area = document.getElementById('resultArea');
    const btn = document.getElementById('btnPdf');

    if (!name || !dateStr || !ntype || !ncount || !nsize || !nrisk) {
        area.innerHTML = `<p class="placeholder">${t('fill_all_fields')}</p>`;
        btn.disabled = true;
        currentData = null;
        return;
    }

    const key = `${ntype}|${ncount}|${nsize}|${nrisk}`;
    const recKey = REC_KEYS[key];
    const months = FU_MONTHS[key] || [];
    if (!recKey) { area.innerHTML = ''; btn.disabled = true; currentData = null; return; }

    const recText = t(recKey);
    const imgDate = new Date(dateStr);

    const followUps = months.map(m => ({
        months: m,
        date: fmtDate(addMonths(imgDate, m))
    }));

    const sizeDisplay = t(nsize);
    const countDisplay = t(ncount.toLowerCase());
    const riskDisplay = nrisk !== 'none' ? t(nrisk + '_risk') : '';

    currentData = { name, imgDate: fmtDate(imgDate), ntype: t(ntype.toLowerCase()),
        countDisplay, sizeDisplay, riskDisplay, recText, isMultiple: ncount==='Multiple',
        followUps, recKey };

    let html = '<div class="result-box">';
    html += `<h4>${t('patient_summary')}</h4>`;
    html += `<div class="field-row"><b>${t('name_label')}:</b> ${name}</div>`;
    html += `<div class="field-row"><b>${t('imaging_date_label')}:</b> ${fmtDate(imgDate)}</div>`;
    html += `<div class="field-row"><b>${t('nodule_label')}:</b> ${t(ntype.toLowerCase())} | ${countDisplay} | ${sizeDisplay}</div>`;
    if (riskDisplay) html += `<div class="field-row"><b>${t('risk_label')}:</b> ${riskDisplay}</div>`;
    html += `<h4>${t('recommendation')}</h4><p>${recText}</p>`;
    if (ncount === 'Multiple') html += `<p class="note">${t('multiple_note')}</p>`;
    html += `<h4>${t('follow_up_schedule')}</h4>`;
    if (followUps.length) {
        html += `<table class="fu-table"><tr><th>${t('timeframe')}</th><th>${t('suggested_date')}</th></tr>`;
        followUps.forEach(f => {
            html += `<tr><td>${f.months} ${t('months')}</td><td class="date">${f.date}</td></tr>`;
        });
        html += '</table>';
    } else {
        html += `<p>${t('no_follow_up')}</p>`;
    }
    html += '</div>';
    area.innerHTML = html;
    btn.disabled = false;
}

// ========== MODAL ==========
function showModal() {
    const sections = t('info_sections');
    let html = '';
    sections.forEach(s => {
        html += `<h3>${s.title}</h3><ul>`;
        s.items.forEach(i => { html += `<li>${i}</li>`; });
        html += '</ul>';
    });
    document.getElementById('modal-title').textContent = t('measurement_info');
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('active');
}

function hideModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

// ========== LANGUAGE ==========
function setLang(l) {
    lang = l;
    document.getElementById('langSelect').value = l;
    refreshLabels();
    update();
}

// ========== PDF ==========
function createPdf() {
    if (!currentData) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pw = doc.internal.pageSize.getWidth() - 20;
    let y = 10;

    // Header
    doc.setFillColor(43, 87, 151);
    doc.rect(10, y, pw, 22, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(16); doc.setFont(undefined, 'bold');
    doc.text(t('report_title'), 10 + pw/2, y + 10, {align: 'center'});
    doc.setFontSize(9); doc.setFont(undefined, 'italic');
    doc.text(t('page_subtitle'), 10 + pw/2, y + 18, {align: 'center'});
    y += 28;

    // Report date
    doc.setTextColor(100,100,100); doc.setFontSize(8); doc.setFont(undefined, 'italic');
    doc.text(`${t('report_generated')}: ${fmtDate(new Date())}`, 10 + pw, y, {align:'right'});
    y += 8;

    // Patient Summary heading
    doc.setFillColor(214, 228, 245);
    doc.rect(10, y, pw, 8, 'F');
    doc.setTextColor(43, 87, 151); doc.setFontSize(11); doc.setFont(undefined, 'bold');
    doc.text('  ' + t('patient_summary'), 12, y + 6);
    y += 12;

    const fields = [
        [t('name_label'), currentData.name],
        [t('imaging_date_label'), currentData.imgDate],
        [t('nodule_label'), `${currentData.ntype} | ${currentData.countDisplay} | ${currentData.sizeDisplay}`]
    ];
    if (currentData.riskDisplay) fields.push([t('risk_label'), currentData.riskDisplay]);

    doc.setTextColor(30,30,30); doc.setFontSize(10);
    fields.forEach(([lbl, val]) => {
        doc.setFont(undefined, 'bold');
        doc.text(`  ${lbl}:`, 12, y);
        doc.setFont(undefined, 'normal');
        doc.text(`  ${val}`, 55, y);
        y += 6;
    });
    y += 4;

    // Recommendation heading
    doc.setFillColor(214, 228, 245);
    doc.rect(10, y, pw, 8, 'F');
    doc.setTextColor(43, 87, 151); doc.setFontSize(11); doc.setFont(undefined, 'bold');
    doc.text('  ' + t('recommendation'), 12, y + 6);
    y += 14;
    doc.setTextColor(30,30,30); doc.setFontSize(10); doc.setFont(undefined, 'normal');
    const recLines = doc.splitTextToSize(currentData.recText, pw - 4);
    doc.text(recLines, 12, y);
    y += recLines.length * 5 + 4;

    if (currentData.isMultiple) {
        doc.setTextColor(184,92,0); doc.setFontSize(8); doc.setFont(undefined, 'italic');
        doc.text(t('multiple_note'), 12, y);
        y += 8;
    }

    // Follow-up heading
    doc.setFillColor(214, 228, 245);
    doc.rect(10, y, pw, 8, 'F');
    doc.setTextColor(43, 87, 151); doc.setFontSize(11); doc.setFont(undefined, 'bold');
    doc.text('  ' + t('follow_up_schedule'), 12, y + 6);
    y += 14;

    if (currentData.followUps.length) {
        // Table header
        doc.setFillColor(240, 244, 248);
        doc.rect(10, y - 4, pw, 7, 'F');
        doc.setTextColor(43,87,151); doc.setFontSize(9); doc.setFont(undefined, 'bold');
        doc.text('    ' + t('timeframe'), 12, y);
        doc.text(t('suggested_date'), 10 + pw/2, y);
        y += 6;

        doc.setFont(undefined, 'normal'); doc.setTextColor(30,30,30);
        currentData.followUps.forEach((f, i) => {
            if (i % 2 === 0) { doc.setFillColor(250,250,252); }
            else { doc.setFillColor(240,244,248); }
            doc.rect(10, y - 4, pw, 6, 'F');
            doc.text(`    ${f.months} ${t('months')}`, 12, y);
            doc.setTextColor(43, 122, 62);
            doc.text(f.date, 10 + pw/2, y);
            doc.setTextColor(30,30,30);
            y += 6;
        });
    } else {
        doc.setTextColor(30,30,30); doc.setFontSize(10); doc.setFont(undefined, 'normal');
        doc.text('  ' + t('no_follow_up'), 12, y);
        y += 8;
    }

    // Footer
    y += 10;
    doc.setDrawColor(200,200,200);
    doc.line(10, y, 10 + pw, y);
    y += 5;
    doc.setTextColor(150,150,150); doc.setFontSize(7); doc.setFont(undefined, 'italic');
    doc.text(t('pdf_footer'), 10 + pw/2, y, {align: 'center'});

    // Save
    const fileName = `Nodule_Report_${currentData.name.replace(/\s+/g,'_')}_${fmtDate(new Date()).replace(/\./g,'')}.pdf`;

    if (typeof AndroidBridge !== 'undefined') {
        const base64 = doc.output('datauristring').split(',')[1];
        AndroidBridge.savePdf(base64, fileName);
    } else {
        doc.save(fileName);
    }
}

// ========== INIT ==========
(function init() {
    // Detect language from URL param or Android bridge or browser
    const params = new URLSearchParams(window.location.search);
    let detectedLang = params.get('lang') || '';
    if (!detectedLang && typeof AndroidBridge !== 'undefined') {
        try { detectedLang = AndroidBridge.getDeviceLanguage(); } catch(e) {}
    }
    if (!detectedLang) {
        detectedLang = (navigator.language || '').slice(0, 2);
    }
    lang = T[detectedLang] ? detectedLang : 'en';
    document.getElementById('langSelect').value = lang;

    // Set today's date
    const today = new Date();
    document.getElementById('imagingDate').value = today.toISOString().slice(0,10);

    refreshLabels();
})();
</script>

</html>
